version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: exvion_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: exvion_user
      POSTGRES_PASSWORD: exvion_password
      POSTGRES_DB: exvion_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - exvion_net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: exvion_api
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://exvion_user:exvion_password@db:5432/exvion_db?schema=public
      JWT_SECRET: dev_secret_key_at_least_32_chars_long
      JWT_EXPIRES_IN: 7d
      RESEND_API_KEY: ${RESEND_API_KEY:-re_123}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:-123}
      WHATSAPP_SENDER: ${WHATSAPP_SENDER:-910000000000}
      ADMIN_EMAIL: admin@exvion.local
      ADMIN_WHATSAPP: +910000000000
      CLIENT_URL: http://localhost:3000
      PORT: 3001
    networks:
      - exvion_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  exvion_net:
    driver: bridge

volumes:
  postgres_data:
